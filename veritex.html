<style>
*{box-sizing:border-box;margin:0;padding:0;}
html,body,#root{height:100%;min-height:100%;}
body{background:#060810;font-family:sans-serif;-webkit-tap-highlight-color:transparent;}
#apiscreen{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 24px;background:radial-gradient(ellipse at 50% 40%,#08192a,#060810);}
#apiscreen h1{font-size:38px;letter-spacing:.22em;color:#e8f2f8;margin-bottom:4px;font-weight:900;font-family:sans-serif;}
#apiscreen .sub{font-size:11px;color:#2a4055;letter-spacing:.2em;margin-bottom:36px;font-family:monospace;}
#apiscreen .card{background:#0b0f18;border:1px solid #162030;border-radius:12px;padding:28px 22px;width:100%;max-width:360px;}
#apiscreen label{font-size:10px;color:#2a4055;text-transform:uppercase;letter-spacing:.1em;display:block;margin-bottom:8px;font-family:monospace;}
#apiscreen input{width:100%;background:#050810;border:1px solid #162030;color:#e8f2f8;padding:12px 14px;border-radius:6px;font-size:15px;outline:none;font-family:monospace;transition:border-color .2s;}
#apiscreen input:focus{border-color:#00d4ff;}
#apiscreen .hint{font-size:11px;color:#2a4055;line-height:1.7;margin-top:10px;}
#apiscreen .hint a{color:#00d4ff;text-decoration:none;}
#apiscreen .gobtn{margin-top:18px;width:100%;padding:15px;background:#00d4ff;border:none;color:#060810;font-size:16px;font-weight:800;letter-spacing:.15em;border-radius:7px;cursor:pointer;font-family:sans-serif;}
#apiscreen .gobtn:disabled{background:#162030;color:#2a4055;cursor:not-allowed;}
#apiscreen .err{margin-top:10px;font-size:12px;color:#ff2550;text-align:center;}
#apiscreen .skip{margin-top:12px;font-size:12px;color:#2a4055;text-align:center;cursor:pointer;text-decoration:underline;}
#root{display:none;}
</style>
</head>
<body>
<div id="apiscreen">
  <h1>VERITEX</h1>
  <div class="sub">AI POLYGRAPH · v7.0</div>
  <div class="card">
    <label>Anthropic API Key (for AI analysis)</label>
    <input type="password" id="apikey" placeholder="sk-ant-api03-..." autocomplete="off" spellcheck="false"/>
    <div class="hint">
      Your key stays in this browser session only — sent directly to Anthropic, never stored elsewhere.<br><br>
      Get a free key at <a href="https://console.anthropic.com" target="_blank">console.anthropic.com</a>
    </div>
    <button class="gobtn" id="startbtn" disabled onclick="launchApp()">INITIALIZE SYSTEM</button>
    <div class="err" id="apierr"></div>
    <div class="skip" onclick="launchWithoutKey()">Skip AI features — sensor analysis only</div>
  </div>
</div>
<div id="root"></div>
<script>
window.VERITEX_API_KEY="";
const ki=document.getElementById("apikey"),sb=document.getElementById("startbtn");
ki.addEventListener("input",()=>{sb.disabled=ki.value.trim().length<20;});
ki.addEventListener("keydown",e=>{if(e.key==="Enter"&&!sb.disabled)launchApp();});
function launchApp(){
  const key=ki.value.trim();
  if(key.length<20){document.getElementById("apierr").textContent="Please enter a valid API key.";return;}
  window.VERITEX_API_KEY=key;
  document.getElementById("apiscreen").style.display="none";
  document.getElementById("root").style.display="block";
}
function launchWithoutKey(){
  window.VERITEX_API_KEY="";
  document.getElementById("apiscreen").style.display="none";
  document.getElementById("root").style.display="block";
}
// Patch fetch to inject API key + CORS headers for Anthropic
const _of=window.fetch.bind(window);
window.fetch=function(url,opts){
  if(typeof url==="string"&&url.includes("api.anthropic.com")&&window.VERITEX_API_KEY){
    opts=opts||{};
    opts.headers=Object.assign({},opts.headers||{},{
      "x-api-key":window.VERITEX_API_KEY,
      "anthropic-version":"2023-06-01",
      "anthropic-dangerous-direct-browser-access":"true"
    });
    if(opts.headers["Authorization"])delete opts.headers["Authorization"];
  }
  return _of(url,opts);
};
</script>

<script type="text/babel" data-presets="react">

// ══════════════════════════════════════════════════════════════════════════════
// BS SCORE UTILITIES
// ══════════════════════════════════════════════════════════════════════════════
function bsColor(score) {
  if (score >= 9) return T.good;

  if (score >= 5) return T.gold;
  if (score >= 3) return T.warn;
  return T.bad;
}
function bsLabel(score) {
  if (score >= 9) return "CERTAINLY TRUE";
  if (score >= 7) return "LIKELY TRUE";
  if (score >= 5) return "UNCERTAIN";
  if (score >= 3) return "LIKELY FALSE";
  return "PROBABLY FALSE";
}
function bsEmoji(score) {
  if (score >= 9) return "✅";
  if (score >= 7) return "🟢";
  if (score >= 5) return "🟡";
  if (score >= 3) return "🟠";
  return "🔴";
}

// ══════════════════════════════════════════════════════════════════════════════
// BS SCORE METER COMPONENT
// ══════════════════════════════════════════════════════════════════════════════
function BSMeter({ score, label, compact = false }) {
  const color = bsColor(score);

  const verdict = bsLabel(score);

  if (compact) return (
    <div style={{ display: "flex", alignItems: "center", gap: 8 }}>

    <div style={{ textAlign: "center", animation: "scorePop 0.6s ease forwards" }}>

        </svg>

          <div style={{ fontFamily: "'Share Tech Mono'", fontSize: 26, color, lineHeight: 1, animation: "bsGlow 2s ease infinite" }}>{score}</div>
          <div style={{ fontFamily: "'Share Tech Mono'", fontSize: 7, color: T.muted }}>/ 10</div>
        </div>
      </div>
      <div style={{ fontFamily: "'Barlow Condensed'", fontWeight: 700, fontSize: 14, color, letterSpacing: "0.08em" }}>{verdict}</div>

}

// ══════════════════════════════════════════════════════════════════════════════
// FACIAL ANALYSIS ENGINE
// ══════════════════════════════════════════════════════════════════════════════
class FacialAnalysisEngine {
  constructor() { this.baseline = null; this.frameHistory = []; this.blinkHistory = []; this.gazeHistory = []; this.microMovementHistory = []; this.lastFrameData = null; this.blinkState = "open"; this.blinkStart = 0; this.blinkCount = 0; }
  detectFaceRegion(imageData, width, height) {
    const data = imageData.data; let skinPixels = 0, cx = 0, cy = 0, minX = width, maxX = 0, minY = height, maxY = 0;
    for (let y = 0; y < height; y++) { for (let x = 0; x < width; x++) { const i = (y * width + x) * 4; const r = data[i], g = data[i + 1], b = data[i + 2]; const isSkin = r > 60 && g > 40 && b > 20 && r > g && r > b && Math.abs(r - g) > 15 && r - b > 20 && r < 250; if (isSkin) { skinPixels++; cx += x; cy += y; if (x < minX) minX = x; if (x > maxX) maxX = x; if (y < minY) minY = y; if (y > maxY) maxY = y; } } }
    if (skinPixels < 100) return null;
    return { centerX: cx / skinPixels, centerY: cy / skinPixels, width: maxX - minX, height: maxY - minY, minX, maxX, minY, maxY, skinPixels, confidence: Math.min(skinPixels / (width * height * 0.15), 1) };
  }
  analyzeEyeRegion(imageData, width, height, face) {
    if (!face) return { leftBrightness: 0, rightBrightness: 0, avgBrightness: 0.5, gazeX: 0.5, gazeY: 0.3 };
    const data = imageData.data; const eyeTop = Math.max(0, Math.round(face.minY + face.height * 0.1)); const eyeBot = Math.min(height, Math.round(face.minY + face.height * 0.45)); const midX = Math.round((face.minX + face.maxX) / 2);
    let leftBright = 0, rightBright = 0, leftCount = 0, rightCount = 0; let darkCX = 0, darkCY = 0, darkTotal = 0;
    for (let y = eyeTop; y < eyeBot; y++) { for (let x = face.minX; x < face.maxX; x++) { const i = (y * width + x) * 4; const lum = data[i] * 0.299 + data[i + 1] * 0.587 + data[i + 2] * 0.114; if (x < midX) { leftBright += lum; leftCount++; } else { rightBright += lum; rightCount++; } if (lum < 55) { const w = (55 - lum) / 55; darkCX += x * w; darkCY += y * w; darkTotal += w; } } }
    const leftAvg = leftCount > 0 ? leftBright / leftCount : 128; const rightAvg = rightCount > 0 ? rightBright / rightCount : 128;
    const gazeX = darkTotal > 10 ? (darkCX / darkTotal - face.minX) / Math.max(face.width, 1) : 0.5; const gazeY = darkTotal > 10 ? (darkCY / darkTotal - eyeTop) / Math.max(eyeBot - eyeTop, 1) : 0.5;
    return { leftBrightness: leftAvg / 255, rightBrightness: rightAvg / 255, avgBrightness: ((leftAvg + rightAvg) / 2) / 255, gazeX: Math.max(0, Math.min(1, gazeX)), gazeY: Math.max(0, Math.min(1, gazeY)) };
  }
  computeMotionScore(imageData, width, height) {
    const data = imageData.data; if (!this.lastFrameData || this.lastFrameData.length !== data.length) { this.lastFrameData = new Uint8Array(data); return 0; }
    let diff = 0, count = 0; for (let i = 0; i < data.length; i += 16) { diff += Math.abs(data[i] - this.lastFrameData[i]) + Math.abs(data[i + 1] - this.lastFrameData[i + 1]) + Math.abs(data[i + 2] - this.lastFrameData[i + 2]); count += 3; }
    this.lastFrameData = new Uint8Array(data); return count > 0 ? diff / count / 255 : 0;
  }
  estimateHeadTilt(face) { if (!face) return 0; return Math.min(Math.abs(face.height / face.width - 1.4) / 1.4, 1); }
  detectBlink(eyeData, timestamp) {
    const THRESH = 0.38; const isClosed = eyeData.avgBrightness < THRESH;
    if (isClosed && this.blinkState === "open") { this.blinkState = "closed"; this.blinkStart = timestamp; }
    else if (!isClosed && this.blinkState === "closed") { const dur = timestamp - this.blinkStart; if (dur > 50 && dur < 600) { this.blinkHistory.push({ ts: timestamp, duration: dur, prolonged: dur > 250 }); this.blinkCount++; } this.blinkState = "open"; }
    const cutoff = timestamp - 60000; this.blinkHistory = this.blinkHistory.filter(b => b.ts > cutoff);
    const recent = this.blinkHistory.filter(b => b.ts > timestamp - 30000);
    return { blinkRate: recent.length * 2, avgDuration: recent.length > 0 ? recent.reduce((a, b) => a + b.duration, 0) / recent.length : 150, prolongedBlinks: recent.filter(b => b.prolonged).length, currentlyClosed: isClosed };
  }
  classifyGaze(gazeX, gazeY) { if (gazeX < 0.35) return "LEFT"; if (gazeX > 0.65) return "RIGHT"; if (gazeY < 0.3) return "UP"; if (gazeY > 0.7) return "DOWN"; return "CENTER"; }
  processFrame(imageData, width, height, timestamp) {
    const face = this.detectFaceRegion(imageData, width, height); const eyeData = this.analyzeEyeRegion(imageData, width, height, face); const motionScore = this.computeMotionScore(imageData, width, height); const headTilt = this.estimateHeadTilt(face); const blinkData = this.detectBlink(eyeData, timestamp); const gazeDir = this.classifyGaze(eyeData.gazeX, eyeData.gazeY);
    this.gazeHistory.push({ ts: timestamp, dir: gazeDir, x: eyeData.gazeX, y: eyeData.gazeY }); this.microMovementHistory.push({ ts: timestamp, motion: motionScore }); this.frameHistory.push({ ts: timestamp, face: !!face, faceConf: face?.confidence || 0, eyeData, motionScore, headTilt, blinkData, gazeDir });
    const cutoff = timestamp - 60000; this.gazeHistory = this.gazeHistory.filter(g => g.ts > cutoff); this.microMovementHistory = this.microMovementHistory.filter(m => m.ts > cutoff); if (this.frameHistory.length > 300) this.frameHistory.shift();
    return { face, eyeData, motionScore, headTilt, blinkData, gazeDir, faceDetected: !!face && face.confidence > 0.1 };
  }
  captureWindow(durationMs = 5000) {
    const now = Date.now(); const frames = this.frameHistory.filter(f => f.ts > now - durationMs); if (frames.length < 3) return null;
    const gazeFrames = frames.map(f => f.gazeDir); const gazeCounts = {}; gazeFrames.forEach(g => { gazeCounts[g] = (gazeCounts[g] || 0) + 1; });
    const dominantGaze = Object.entries(gazeCounts).sort((a, b) => b[1] - a[1])[0]?.[0] || "CENTER"; const gazeAversion = 1 - (gazeCounts["CENTER"] || 0) / frames.length;
    const avgMotion = frames.reduce((a, f) => a + f.motionScore, 0) / frames.length; const avgHeadTilt = frames.reduce((a, f) => a + f.headTilt, 0) / frames.length;
    const blinkFrames = frames.map(f => f.blinkData); const avgBlinkRate = blinkFrames.reduce((a, b) => a + b.blinkRate, 0) / blinkFrames.length; const avgBlinkDuration = blinkFrames.reduce((a, b) => a + b.avgDuration, 0) / blinkFrames.length; const prolongedBlinks = blinkFrames.reduce((a, b) => a + b.prolongedBlinks, 0);
    let gazeShifts = 0; for (let i = 1; i < gazeFrames.length; i++) { if (gazeFrames[i] !== gazeFrames[i - 1]) gazeShifts++; } const gazeShiftRate = gazeShifts / frames.length;
    return { dominantGaze, gazeAversion, avgMotion, avgHeadTilt, avgBlinkRate, avgBlinkDuration, prolongedBlinks, gazeShiftRate, faceDetected: frames.filter(f => f.face).length / frames.length, frameCount: frames.length, gazeCounts };
  }

  deceptionScore(captured, baseline) {
    if (!captured || !baseline) return { score: 0.5, level: "UNKNOWN", indicators: [] };
    const ind = []; let score = 0;
    const gazeAvDev = captured.gazeAversion - baseline.gazeAversion; if (gazeAvDev > 0.2) { score += 0.25 * Math.min(gazeAvDev / 0.5, 1); ind.push({ name: "GAZE AVERSION", val: `+${(gazeAvDev * 100).toFixed(0)}%`, flag: true }); } else ind.push({ name: "GAZE AVERSION", val: `${(captured.gazeAversion * 100).toFixed(0)}%`, flag: false });
    const blinkDev = Math.abs(captured.avgBlinkRate - baseline.avgBlinkRate); if (blinkDev > 8) { score += 0.20 * Math.min(blinkDev / 20, 1); ind.push({ name: "BLINK RATE", val: `${captured.avgBlinkRate.toFixed(0)}/min Δ${blinkDev.toFixed(0)}`, flag: true }); } else ind.push({ name: "BLINK RATE", val: `${captured.avgBlinkRate.toFixed(0)}/min`, flag: false });
    if (captured.prolongedBlinks > (baseline.prolongedBlinks + 1)) { score += 0.15; ind.push({ name: "PROLONGED BLINKS", val: `${captured.prolongedBlinks}`, flag: true }); } else ind.push({ name: "PROLONGED BLINKS", val: `${captured.prolongedBlinks}`, flag: false });
    const motDev = captured.avgMotion - baseline.avgMotion; if (motDev > 0.015) { score += 0.18 * Math.min(motDev / 0.04, 1); ind.push({ name: "MICRO-MOVEMENT", val: `+${(motDev * 100).toFixed(1)}%`, flag: true }); } else ind.push({ name: "MICRO-MOVEMENT", val: `${(captured.avgMotion * 100).toFixed(1)}%`, flag: false });
    const shiftDev = captured.gazeShiftRate - baseline.gazeShiftRate; if (shiftDev > 0.1) { score += 0.12 * Math.min(shiftDev / 0.3, 1); ind.push({ name: "GAZE SHIFTS", val: `+${(shiftDev * 100).toFixed(0)}%`, flag: true }); } else ind.push({ name: "GAZE SHIFTS", val: `${(captured.gazeShiftRate * 100).toFixed(0)}%`, flag: false });
    const headDev = captured.avgHeadTilt - baseline.avgHeadTilt; if (headDev > 0.1) { score += 0.10 * Math.min(headDev / 0.3, 1); ind.push({ name: "HEAD MOVEMENT", val: `+${(headDev * 100).toFixed(0)}%`, flag: true }); } else ind.push({ name: "HEAD MOVEMENT", val: `${(captured.avgHeadTilt * 100).toFixed(0)}%`, flag: false });
    const n = Math.min(score, 1); return { score: n, level: n > 0.6 ? "HIGH" : n > 0.3 ? "MODERATE" : "LOW", indicators: ind };
  }
}

// ══════════════════════════════════════════════════════════════════════════════
// FACIAL HOOK
// ══════════════════════════════════════════════════════════════════════════════
function useFacialAnalysis(active) {
  const videoRef = useRef(null); const canvasRef = useRef(null); const streamRef = useRef(null);
  const engineRef = useRef(new FacialAnalysisEngine()); const animRef = useRef(null); const overlayCanvasRef = useRef(null);
  const [live, setLive] = useState({ faceDetected: false, gazeDir: "CENTER", blinkRate: 0, avgBlinkDuration: 150, motionScore: 0, headTilt: 0, gazeX: 0.5, gazeY: 0.5, deceptionScore: 0, deceptionLevel: "UNKNOWN", deceptionIndicators: [], prolongedBlinks: 0, gazeAversion: 0, faceConfidence: 0 });
  const [ready, setReady] = useState(false); const [error, setError] = useState(null); const [baselineSet, setBaselineSet] = useState(false);

  useEffect(() => {
    if (!active) return; let mounted = true;
    const video = document.createElement("video"); video.setAttribute("playsinline", true); video.muted = true; videoRef.current = video;
    const canvas = document.createElement("canvas"); canvas.width = 160; canvas.height = 120; canvasRef.current = canvas;
    navigator.mediaDevices?.getUserMedia({ video: { facingMode: "user", width: 320, height: 240, frameRate: 15 } }).then(async stream => {
      if (!mounted) { stream.getTracks().forEach(t => t.stop()); return; }
      streamRef.current = stream; video.srcObject = stream; await video.play(); setReady(true);
      const ctx = canvas.getContext("2d"); const eng = engineRef.current;
      const loop = () => {

            {[{ l: "GAZE", v: dec.gazeDir, c: dec.gazeDir === "CENTER" ? T.good : T.warn }, { l: "BLINK", v: `${dec.blinkRate.toFixed(0)}/m`, c: T.rose }, { l: "MOVE", v: `${(dec.motionScore * 100).toFixed(1)}%`, c: dec.motionScore > 0.04 ? T.warn : T.good }, { l: "AVERT", v: `${(dec.gazeAversion * 100).toFixed(0)}%`, c: dec.gazeAversion > 0.4 ? T.warn : T.good }].map(s => (
              <div key={s.l} style={{ background: T.panel2, borderRadius: 4, padding: "4px 6px" }}>
                <div style={{ fontFamily: "'Share Tech Mono'", fontSize: 6, color: T.muted }}>{s.l}</div>
                <div style={{ fontFamily: "'Share Tech Mono'", fontSize: 10, color: s.c }}>{s.v}</div>
              </div>
            ))}
          </div>
        </div>
      </div>
    </div>
  );
}

// ══════════════════════════════════════════════════════════════════════════════
// CUSTOM QUESTION BANK EDITOR (Pre-examination setup, up to 25)
// ══════════════════════════════════════════════════════════════════════════════
function QuestionBankEditor({ initialQuestions = [], onSave, onCancel }) {
  const [questions, setQuestions] = useState(
    initialQuestions.length > 0
      ? initialQuestions
      : Array(5).fill("").map((_, i) => ({ id: `cq${i + 1}`, text: "", category: "custom" }))
  );
  const MAX = 25;

  const addQuestion = () => {
    if (questions.length >= MAX) return;
    setQuestions(q => [...q, { id: `cq${Date.now()}`, text: "", category: "custom" }]);
  };

  const removeQuestion = (idx) => setQuestions(q => q.filter((_, i) => i !== idx));
  const updateText = (idx, text) => setQuestions(q => q.map((item, i) => i === idx ? { ...item, text } : item));
  const updateCat = (idx, category) => setQuestions(q => q.map((item, i) => i === idx ? { ...item, category } : item));
  const moveUp = (idx) => { if (idx === 0) return; setQuestions(q => { const a = [...q]; [a[idx - 1], a[idx]] = [a[idx], a[idx - 1]]; return a; }); };
  const moveDown = (idx) => { if (idx === questions.length - 1) return; setQuestions(q => { const a = [...q]; [a[idx], a[idx + 1]] = [a[idx + 1], a[idx]]; return a; }); };

  const validQuestions = questions.filter(q => q.text.trim().length > 0);
  const catColors = { custom: T.accent, sensitive: T.warn, control: T.good, deception: T.bad };
  const catLabels = { custom: "GENERAL", sensitive: "SENSITIVE", control: "CONTROL", deception: "CRITICAL" };

  return (
    <div style={{ minHeight: "100vh", padding: "24px 18px", maxWidth: 540, margin: "0 auto" }}>
      {/* Header */}
      <div style={{ marginBottom: 20 }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start" }}>
          <div>
            <div style={{ fontFamily: "'Barlow Condensed'", fontWeight: 900, fontSize: 24, color: T.white, letterSpacing: "0.05em" }}>QUESTION BANK</div>
            <div style={{ fontFamily: "'Share Tech Mono'", fontSize: 9, color: T.muted, letterSpacing: "0.1em", marginTop: 2 }}>CUSTOM EXAMINATION · UP TO {MAX} QUESTIONS</div>
          </div>
          <div style={{ fontFamily: "'Share Tech Mono'", fontSize: 22, color: T.gold, lineHeight: 1 }}>{questions.length}<span style={{ fontSize: 10, color: T.muted }}>/{MAX}</span></div>
        </div>

        {/* Progress bar */}
        <div style={{ height: 3, background: T.border, borderRadius: 2, marginTop: 10 }}>
          <div style={{ height: "100%", width: `${(questions.length / MAX) * 100}%`, background: `linear-gradient(90deg, ${T.accent}, ${T.gold})`, borderRadius: 2, transition: "width 0.3s" }} />
        </div>

        <div style={{ marginTop: 12, padding: "10px 14px", background: T.panel, border: `1px solid ${T.gold}33`, borderRadius: 8, fontSize: 12, color: T.text, lineHeight: 1.6 }}>
          🎯 These questions will be voice-prompted after the standard examination. Each response will receive a <strong style={{ color: T.gold }}>BS Score 1–10</strong> — 10 = certainly true, 1 = probably false.
        </div>
      </div>

      {/* Question list */}
      <div style={{ marginBottom: 14 }}>
        {questions.map((q, idx) => (
          <div key={q.id} style={{ background: T.panel, border: `1px solid ${T.border}`, borderRadius: 10, padding: 14, marginBottom: 10, animation: `slideIn 0.3s ease ${idx * 0.03}s both` }}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 10 }}>
              <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                <div style={{ fontFamily: "'Share Tech Mono'", fontSize: 11, color: T.muted, minWidth: 24, textAlign: "center" }}>#{idx + 1}</div>
                {/* Category selector */}
                <div style={{ display: "flex", gap: 4 }}>
                  {Object.entries(catLabels).map(([cat, label]) => (
                    <button key={cat} onClick={() => updateCat(idx, cat)} style={{ padding: "2px 7px", background: q.category === cat ? catColors[cat] + "33" : "none", border: `1px solid ${q.category === cat ? catColors[cat] : T.border}`, color: q.category === cat ? catColors[cat] : T.muted, borderRadius: 10, cursor: "pointer", fontFamily: "'Share Tech Mono'", fontSize: 7, letterSpacing: "0.05em", transition: "all 0.15s" }}>
                      {label}
                    </button>
                  ))}
                </div>
              </div>
              <div style={{ display: "flex", gap: 5 }}>
                <button onClick={() => moveUp(idx)} disabled={idx === 0} style={{ background: "none", border: "none", color: idx === 0 ? T.muted : T.text, cursor: idx === 0 ? "not-allowed" : "pointer", fontSize: 14, lineHeight: 1 }}>↑</button>
                <button onClick={() => moveDown(idx)} disabled={idx === questions.length - 1} style={{ background: "none", border: "none", color: idx === questions.length - 1 ? T.muted : T.text, cursor: idx === questions.length - 1 ? "not-allowed" : "pointer", fontSize: 14, lineHeight: 1 }}>↓</button>
                <button onClick={() => removeQuestion(idx)} style={{ background: "none", border: "none", color: T.bad, cursor: "pointer", fontSize: 14, lineHeight: 1, padding: "0 2px" }}>✕</button>
              </div>
            </div>
            <textarea
              value={q.text}
              onChange={e => updateText(idx, e.target.value)}
              placeholder={`Question ${idx + 1} — type your examination question here…`}
              rows={2}
              style={{ resize: "vertical", fontSize: 15, lineHeight: 1.4, borderColor: q.text.trim() ? catColors[q.category] + "55" : T.border }}
            />
            {q.text.trim().length > 0 && (
              <div style={{ fontFamily: "'Share Tech Mono'", fontSize: 8, color: catColors[q.category], marginTop: 4 }}>
                {catLabels[q.category]} · {q.text.trim().length} chars
              </div>
            )}
          </div>
        ))}
      </div>

      {/* Add question */}
      {questions.length < MAX && (
        <button onClick={addQuestion} style={{ width: "100%", marginBottom: 14, padding: 13, background: "none", border: `2px dashed ${T.accentDim}`, color: T.accent, fontFamily: "'Barlow Condensed'", fontWeight: 700, fontSize: 15, letterSpacing: "0.1em", borderRadius: 10, cursor: "pointer", transition: "border-color 0.2s" }}
          onMouseEnter={e => e.currentTarget.style.borderColor = T.accent}
          onMouseLeave={e => e.currentTarget.style.borderColor = T.accentDim}>
          + ADD QUESTION ({questions.length}/{MAX})
        </button>
      )}

      {/* Footer controls */}
      <div style={{ display: "flex", gap: 10, marginBottom: 40 }}>
        <button onClick={onCancel} style={{ flex: 1, padding: 14, background: "none", border: `1px solid ${T.border}`, color: T.muted, fontFamily: "'Barlow Condensed'", fontWeight: 600, fontSize: 15, borderRadius: 8, cursor: "pointer" }}>
          CANCEL
        </button>
        <button onClick={() => onSave(validQuestions)}
          disabled={validQuestions.length === 0}
          style={{ flex: 2, padding: 14, background: validQuestions.length > 0 ? T.gold : T.border, border: "none", color: validQuestions.length > 0 ? T.bg : T.muted, fontFamily: "'Barlow Condensed'", fontWeight: 800, fontSize: 16, letterSpacing: "0.12em", borderRadius: 8, cursor: validQuestions.length > 0 ? "pointer" : "not-allowed" }}>
          SAVE {validQuestions.length} QUESTION{validQuestions.length !== 1 ? "S" : ""} →
        </button>
      </div>
    </div>
  );
}

// ══════════════════════════════════════════════════════════════════════════════
// CUSTOM QUESTION EXAMINATION (voice-prompted, BS scored)
// ══════════════════════════════════════════════════════════════════════════════
function CustomExamination({ session, customQuestions, onComplete }) {
  const ppg = usePPG(true);
  const sensors = useSensors(true);
  const vs = useVoiceStress(true);
  const facial = useFacialAnalysis(true);

  const [qIdx, setQIdx] = useState(0);
  const [responses, setResponses] = useState([]);
  const [uiState, setUiState] = useState("idle"); // idle | speaking | listening | scoring | done
  const [transcript, setTranscript] = useState("");
  const [currentBSScore, setCurrentBSScore] = useState(null);
  const [scoringMsg, setScoringMsg] = useState("");

  const startRef = useRef(null);
  const snapRef = useRef(null);
  const vsaStartRef = useRef(null);
  const facialStartRef = useRef(null);
  const voiceRef = useRef(null);
  const recRef = useRef(null);

  useEffect(() => {
    if (window.speechSynthesis) { window.speechSynthesis.onvoiceschanged = () => { voiceRef.current = getVoice(); }; voiceRef.current = getVoice(); }
  }, []);

  const q = customQuestions[qIdx];

  const askQ = useCallback(async (question) => {
    setTranscript(""); setCurrentBSScore(null); setScoringMsg(""); setUiState("speaking");
    snapRef.current = { hr: ppg.hr, hrv: ppg.hrv, gsr: sensors.gsr, motion: sensors.motion };
    vsaStartRef.current = Date.now(); facialStartRef.current = Date.now();
    const intro = qIdx === 0 ? "Custom examination phase. I will now ask your personalized questions. Answer yes or no. " : "";
    await speak(intro + question.text, { voice: voiceRef.current, rate: 0.86, pitch: 0.92 });
    startRef.current = Date.now();
    setUiState("listening");
    startListening(question);
  }, [qIdx, ppg, sensors]);

  useEffect(() => {
    if (!q) return;
    const t = setTimeout(() => askQ(q), qIdx === 0 ? 600 : 400);
    return () => clearTimeout(t);
  }, [qIdx]);

  const startListening = (question) => {
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SR) { setUiState("listening"); return; }
    if (recRef.current) { try { recRef.current.stop(); } catch {} }
    const rec = new SR();
    rec.lang = "en-US"; rec.interimResults = true; rec.maxAlternatives = 3;
    rec.onstart = () => setUiState("listening");
    rec.onresult = e => {
      const finals = Array.from(e.results).filter(r => r.isFinal).map(r => r[0].transcript).join(" ");
      const interim = Array.from(e.results).filter(r => !r.isFinal).map(r => r[0].transcript).join(" ");
      setTranscript((finals + " " + interim).trim());
      if (finals.trim()) { const yn = parseYesNo(finals.trim()); if (yn) { rec.stop(); captureAndScore(yn, question); } }
    };
    rec.onend = () => { if (uiState === "listening") setUiState("listening"); };
    rec.onerror = () => {};
    recRef.current = rec; rec.start();
  };

  const captureAndScore = async (ans, question) => {
    const vsaFeatures = vs.captureFeatures(Date.now() - vsaStartRef.current);
    const vsaStress = vs.getStressForCapture(vsaFeatures);
    const facialCapture = facial.captureWindow(Date.now() - facialStartRef.current);
    const facialDeception = facial.getDeceptionForCapture(facialCapture);
    const rt = Date.now() - startRef.current;

    setUiState("scoring");
    setScoringMsg("Analyzing response…");
    await speak("Analyzing.", { voice: voiceRef.current, rate: 1.1 });

    // Compute BS score from all sensors
    const bsScore = await computeBSScore({
      answer: ans,
      responseTime: rt,
      vsaStress, vsaFeatures,
      facialDeception, facialCapture,
      cardiac: { hr: ppg.hr, hrv: ppg.hrv },
      cardiacStart: snapRef.current,
      gsr: sensors.gsr,
      question,
      profile: session.profile,
      priorResponses: session.responses.concat(responses),
    });

    setCurrentBSScore(bsScore);
    setScoringMsg("");

    const rec = {
      questionId: question.id, type: "custom", category: question.category,
      text: question.text, answer: ans, responseTime: rt,
      bsScore: bsScore.score, bsLabel: bsScore.label, bsRationale: bsScore.rationale,
      sensorAtAnswer: { hr: ppg.hr, hrv: ppg.hrv, gsr: sensors.gsr, motion: sensors.motion },
      sensorAtStart: snapRef.current,
      delta: { hr: (ppg.hr || 0) - (snapRef.current?.hr || 0), hrv: (ppg.hrv || 0) - (snapRef.current?.hrv || 0), gsr: sensors.gsr - (snapRef.current?.gsr || sensors.gsr) },
      vsaFeatures, vsaStress: vsaStress ? { score: vsaStress.score, level: vsaStress.level } : null,
      facialCapture, facialDeception: facialDeception ? { score: facialDeception.score, level: facialDeception.level } : null,
      voiceTranscript: transcript,
    };

    // Announce score
    await speak(`BS score: ${bsScore.score} out of 10. ${bsScore.verdict}.`, { voice: voiceRef.current, rate: 0.88, pitch: bsScore.score >= 7 ? 1.05 : bsScore.score <= 3 ? 0.88 : 0.95 });

    const updated = [...responses, rec];
    setResponses(updated);

    // Brief pause then next
    if (qIdx < customQuestions.length - 1) {
      await new Promise(r => setTimeout(r, 2200));
      setQIdx(i => i + 1);
    } else {
      setUiState("done");
      await speak("Custom examination complete. Generating your full report.", { voice: voiceRef.current, rate: 0.9 });
      setTimeout(() => onComplete(updated), 1200);
    }
  };

  // Heuristic BS score computation
  const computeBSScore = async ({ answer, responseTime, vsaStress, vsaFeatures, facialDeception, facialCapture, cardiac, cardiacStart, gsr, question, profile, priorResponses }) => {
    // Collect deception signals
    const signals = [];
    let deceptionWeight = 0;

    // VSA contribution (0–3 points deduction)
    if (vsaStress?.level === "HIGH") { signals.push("HIGH voice stress"); deceptionWeight += 2.5; }
    else if (vsaStress?.level === "MODERATE") { signals.push("moderate voice stress"); deceptionWeight += 1.2; }

    // Facial contribution (0–3 points)
    if (facialDeception?.level === "HIGH") { signals.push("HIGH facial deception markers"); deceptionWeight += 2.5; }
    else if (facialDeception?.level === "MODERATE") { signals.push("gaze aversion detected"); deceptionWeight += 1.2; }
    if (facialCapture?.prolongedBlinks > 2) { signals.push("prolonged blinks"); deceptionWeight += 0.5; }

    // Response time (slow = hesitation)
    if (responseTime > 4000) { signals.push("very slow response"); deceptionWeight += 1.5; }
    else if (responseTime > 2500) { signals.push("hesitation detected"); deceptionWeight += 0.7; }

    // HRV drop
    const hrDelta = (cardiac.hr || 72) - (cardiacStart?.hr || 72);
    if (hrDelta > 8) { signals.push("cardiac elevation"); deceptionWeight += 0.8; }

    // GSR spike
    if (gsr > 0.65) { signals.push("GSR elevation"); deceptionWeight += 0.5; }

    // Specific jitter/shimmer flags
    if (vsaFeatures?.jitter > 0.07) { signals.push("elevated pitch jitter"); deceptionWeight += 0.4; }
    if (vsaFeatures?.hnr < 8) { signals.push("reduced HNR"); deceptionWeight += 0.3; }

    // Raw score: start at 10, subtract deception weight, clamp 1–10
    let rawScore = Math.max(1, Math.min(10, Math.round(10 - deceptionWeight)));

    // AI refinement
    try {
      const priorCtx = priorResponses.slice(-5).map(r => `"${r.text}" → ${r.answer} (BS:${r.bsScore || "?"})`).join("; ");
      const res = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST", headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          model: "claude-sonnet-4-20250514", max_tokens: 400,
          messages: [{
            role: "user", content: `You are a forensic truth veracity scorer. Based on multi-modal polygraph data, score this response on a BS scale of 1 to 10 where 10 = certainly true and 1 = probably false. Return ONLY JSON: {"score":<1-10 integer>,"label":"<CERTAINLY TRUE|LIKELY TRUE|UNCERTAIN|LIKELY FALSE|PROBABLY FALSE>","rationale":"<1 sentence>","verdict":"<spoken aloud verdict, 1 sentence>"}

QUESTION: "${question.text}"
ANSWER: ${answer}
RESPONSE TIME: ${responseTime}ms
VOICE STRESS: ${vsaStress?.level || "UNKNOWN"} (score: ${((vsaStress?.score || 0) * 100).toFixed(0)}%)
FACIAL DECEPTION: ${facialDeception?.level || "UNKNOWN"} (score: ${((facialDeception?.score || 0) * 100).toFixed(0)}%)
DOMINANT GAZE: ${facialCapture?.dominantGaze || "unknown"}, AVERSION: ${((facialCapture?.gazeAversion || 0) * 100).toFixed(0)}%
BLINK RATE: ${facialCapture?.avgBlinkRate?.toFixed(0) || "?"}/min PROLONGED BLINKS: ${facialCapture?.prolongedBlinks || 0}
CARDIAC DELTA: +${hrDelta}bpm GSR: ${gsr}
DECEPTION SIGNALS DETECTED: ${signals.length > 0 ? signals.join(", ") : "none"}
HEURISTIC SCORE: ${rawScore}
PRIOR RESPONSES: ${priorCtx || "none"}
SUBJECT PROFILE: anxiety=${profile?.anxietyNow || "?"}, mentalDx=${profile?.mentalDx || "none"}, priorPoly=${profile?.priorPoly || "never"}`
          }]
        }),
      });
      const data = await res.json();
      const txt = (data.content || []).map(c => c.text || "").join("").replace(/```json|```/g, "").trim();
      const parsed = JSON.parse(txt);
      return { score: Math.max(1, Math.min(10, parsed.score)), label: parsed.label, rationale: parsed.rationale, verdict: parsed.verdict };
    } catch {
      return { score: rawScore, label: bsLabel(rawScore), rationale: signals.length > 0 ? `Detected: ${signals.join(", ")}.` : "No significant deception markers detected.", verdict: bsLabel(rawScore) };
    }
  };

  const catColors = { custom: T.accent, sensitive: T.warn, control: T.good, deception: T.bad };

  return (
    <div style={{ minHeight: "100vh", padding: "24px 18px", maxWidth: 480, margin: "0 auto", display: "flex", flexDirection: "column" }}>
      {/* Header */}
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 12 }}>
        <div>
          <div style={{ fontFamily: "'Barlow Condensed'", fontWeight: 800, fontSize: 20, color: T.white }}>CUSTOM EXAM</div>
          <div style={{ fontFamily: "'Share Tech Mono'", fontSize: 9, color: T.muted }}>Q{qIdx + 1} OF {customQuestions.length} · BS SCORING</div>
        </div>
        <div style={{ display: "flex", gap: 4 }}>
          {customQuestions.map((_, i) => <div key={i} style={{ width: 7, height: 7, borderRadius: "50%", background: i < qIdx ? T.gold : i === qIdx ? T.accent : T.border, transition: "background 0.3s" }} />)}
        </div>
      </div>

      <PPGGuide fingerDetected={ppg.fingerDetected} hr={ppg.hr} hrv={ppg.hrv} />
      <FacialMini facial={facial} />
      <VoiceStatus speaking={uiState === "speaking"} listening={uiState === "listening"} transcript={transcript} pitch={vs.live.pitch} stressLevel={vs.live.stressLevel} />

      {/* Question card */}
      {q && (
        <div style={{ background: T.panel, border: `2px solid ${catColors[q.category] || T.accent}44`, borderRadius: 12, padding: 18, marginBottom: 12, flex: 1, animation: "fadeUp 0.4s ease" }}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 10 }}>
            <div style={{ fontFamily: "'Share Tech Mono'", fontSize: 9, color: catColors[q.category] || T.accent, letterSpacing: "0.1em" }}>CUSTOM QUESTION · {q.category?.toUpperCase() || "GENERAL"}</div>
            <div style={{ fontFamily: "'Share Tech Mono'", fontSize: 9, color: T.muted }}>BS SCORE PENDING</div>
          </div>
          <div style={{ fontSize: 19, color: T.white, fontWeight: 600, lineHeight: 1.5, marginBottom: 18 }}>{q.text}</div>

          {/* BS Score display when available */}
          {uiState === "scoring" && (
            <div style={{ textAlign: "center", padding: 16, animation: "fadeUp 0.3s ease" }}>
              <div style={{ fontFamily: "'Share Tech Mono'", fontSize: 10, color: T.gold, animation: "pulse 0.8s infinite", marginBottom: 8 }}>⚡ COMPUTING BS SCORE…</div>
              <div style={{ fontSize: 12, color: T.muted }}>{scoringMsg}</div>
            </div>
          )}

          {currentBSScore && uiState !== "scoring" && (
            <div style={{ background: T.panel2, border: `1px solid ${bsColor(currentBSScore.score)}44`, borderRadius: 10, padding: 14, animation: "scorePop 0.6s ease" }}>
              <BSMeter score={currentBSScore.score} label="BS VERACITY SCORE" />
              <div style={{ marginTop: 10, fontSize: 12, color: T.text, lineHeight: 1.6, textAlign: "center" }}>{currentBSScore.rationale}</div>
            </div>
          )}

          {/* Manual YES/NO */}
          {(uiState === "listening" || uiState === "idle") && !currentBSScore && (
            <div style={{ display: "flex", gap: 10 }}>
              <button onClick={() => { try { recRef.current?.stop(); } catch {} captureAndScore("Yes", q); }} style={{ flex: 1, padding: 14, background: T.good + "1a", border: `2px solid ${T.good}`, color: T.good, fontFamily: "'Barlow Condensed'", fontWeight: 700, fontSize: 18, borderRadius: 9, cursor: "pointer" }}>YES</button>
              <button onClick={() => { try { recRef.current?.stop(); } catch {} captureAndScore("No", q); }} style={{ flex: 1, padding: 14, background: T.bad + "1a", border: `2px solid ${T.bad}`, color: T.bad, fontFamily: "'Barlow Condensed'", fontWeight: 700, fontSize: 18, borderRadius: 9, cursor: "pointer" }}>NO</button>
            </div>
          )}
          <button onClick={() => askQ(q)} style={{ width: "100%", marginTop: 8, padding: 9, background: "none", border: `1px solid ${T.purple}44`, color: T.purple, borderRadius: 7, cursor: "pointer", fontFamily: "'Share Tech Mono'", fontSize: 9 }}>↺ REPEAT QUESTION</button>
        </div>
      )}

      {/* Previous BS scores strip */}
      {responses.length > 0 && (
        <div style={{ background: T.panel, border: `1px solid ${T.border}`, borderRadius: 9, padding: 12, marginTop: 4 }}>
          <div style={{ fontFamily: "'Share Tech Mono'", fontSize: 8, color: T.muted, marginBottom: 8, letterSpacing: "0.1em" }}>COMPLETED · BS SCORES</div>
          {responses.slice(-4).map((r, i) => (
            <div key={i} style={{ marginBottom: 6 }}>
              <div style={{ fontSize: 11, color: T.text, marginBottom: 3, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>"{r.text}"</div>
              <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                <div style={{ fontFamily: "'Share Tech Mono'", fontSize: 8, color: r.answer === "Yes" ? T.good : T.bad }}>→ {r.answer}</div>
                <div style={{ flex: 1 }}><BSMeter score={r.bsScore} compact /></div>
              </div>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

// POST-EXAM RESULTS WITH BS SCORES
// ══════════════════════════════════════════════════════════════════════════════
function Results({ session, onReset, onDelete, onEdit }) {
  const [ai, setAi] = useState(null);
  const [loading, setLoading] = useState(true);
  const [progress, setProgress] = useState(0);
  const [showDel, setShowDel] = useState(false);
  const [activeTab, setActiveTab] = useState("standard"); // standard | custom | summary
  const voiceRef = useRef(null);

  useEffect(() => {
    if (window.speechSynthesis) { window.speechSynthesis.onvoiceschanged = () => { voiceRef.current = getVoice(); }; voiceRef.current = getVoice(); }
    speak("Generating your comprehensive examination report with custom question BS scores.", { voice: voiceRef.current, rate: 0.9 });

  const startL = question => {
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition; if (!SR) { setUiState("idle"); return; }

        </div>)}
      </div>

        {[{ l: "HR", v: ppg.hr || "--", c: T.bad }, { l: "HRV", v: ppg.hrv || "--", c: T.gold }, { l: "GSR", v: (sensors.gsr * 100).toFixed(0) + "%", c: T.warn }, { l: "F0", v: vs.live.pitch > 0 ? vs.live.pitch : "--", c: T.teal }, { l: "GAZE", v: facial.live.gazeDir, c: facial.live.gazeDir === "CENTER" ? T.good : T.warn }, { l: "BLINK", v: facial.live.blinkRate.toFixed(0), c: T.rose }].map(s => (

            <div style={{ fontFamily: "'Share Tech Mono'", fontSize: 6, color: T.muted }}>{s.l}</div>

  );
}

function Calibration({ onComplete }) {
  const ppg = usePPG(true); const sensors = useSensors(true); const vs = useVoiceStress(true); const facial = useFacialAnalysis(true);
  const [phase, setPhase] = useState("idle"); const [countdown, setCountdown] = useState(16); const baselines = useRef({}); const voiceRef = useRef(null);
  useEffect(() => {
    if (window.speechSynthesis) { window.speechSynthesis.onvoiceschanged = () => { voiceRef.current = getVoice(); }; voiceRef.current = getVoice(); }
    setTimeout(async () => { await speak("Calibration. Finger on rear camera. Look at front camera. Remain silent and still.", { voice: voiceRef.current, rate: 0.88 }); setPhase("baseline"); }, 600);
  }, []);
  useEffect(() => {
    if (phase === "idle") return;
    if (countdown <= 0) {
      if (phase === "baseline") { const facialBaseline = facial.setBaseline(); const voiceBaseline = vs.setBaseline(); baselines.current.rest = { hr: ppg.hr, hrv: ppg.hrv, gsr: sensors.gsr, facialBaseline, voiceBaseline }; (async () => { await speak("Resting baseline recorded. Now say clearly: The weather today is quite pleasant and I feel comfortable right now.", { voice: voiceRef.current, rate: 0.88 }); setPhase("voice_truth"); setCountdown(12); })(); }
      else if (phase === "voice_truth") { baselines.current.truth = { hr: ppg.hr, hrv: ppg.hrv, vsaFeatures: vs.captureFeatures(10000), facialCapture: facial.captureWindow(10000) }; (async () => { await speak("All baselines locked. Standard examination starting.", { voice: voiceRef.current, rate: 0.88 }); onComplete(baselines.current); })(); }
      return;
    }
    const t = setTimeout(() => setCountdown(c => c - 1), 1000); return () => clearTimeout(t);
  }, [countdown, phase]);
  const cfg = { idle: { title: "PREPARING", color: T.muted, dur: 1 }, baseline: { title: "RESTING BASELINE — SILENT", color: T.accent, dur: 16 }, voice_truth: { title: "VOICE TRUTH BASELINE", color: T.good, dur: 12 } };
  const c = cfg[phase] || cfg.idle; const pct = phase !== "idle" ? countdown / c.dur : 1;
  return (
    <div style={{ minHeight: "100vh", padding: "28px 18px", maxWidth: 480, margin: "0 auto" }}>
      <div style={{ fontFamily: "'Barlow Condensed'", fontWeight: 800, fontSize: 22, color: T.white }}>CALIBRATION</div>
      <div style={{ fontFamily: "'Share Tech Mono'", fontSize: 9, color: T.muted, letterSpacing: "0.1em", marginBottom: 16 }}>VOICE + FACIAL + PHYSIOLOGICAL BASELINE</div>
      <PPGGuide fingerDetected={ppg.fingerDetected} hr={ppg.hr} hrv={ppg.hrv} />
      <FacialMini facial={facial} />
      <div style={{ textAlign: "center", margin: "16px 0" }}>
        <div style={{ position: "relative", width: 100, height: 100, margin: "0 auto" }}>
          <svg width={100} height={100} style={{ position: "absolute", inset: 0 }}><circle cx={50} cy={50} r={42} fill="none" stroke={T.border} strokeWidth={4} /><circle cx={50} cy={50} r={42} fill="none" stroke={c.color} strokeWidth={4} strokeDasharray={`${pct * 264} 264`} strokeLinecap="round" transform="rotate(-90 50 50)" style={{ transition: "stroke-dasharray 0.9s" }} /></svg>
          <div style={{ position: "absolute", inset: 0, display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center" }}><div style={{ fontFamily: "'Share Tech Mono'", fontSize: 26, color: c.color }}>{phase !== "idle" ? countdown : "…"}</div><div style={{ fontFamily: "'Share Tech Mono'", fontSize: 7, color: T.muted }}>SEC</div></div>
        </div>
        <div style={{ fontFamily: "'Barlow Condensed'", fontWeight: 700, fontSize: 16, color: c.color, letterSpacing: "0.1em", marginTop: 10 }}>{c.title}</div>
        {phase === "voice_truth" && <div style={{ margin: "12px 8px 0", padding: 12, background: T.good + "18", border: `1px solid ${T.good}44`, borderRadius: 8, fontSize: 14, color: T.white, fontWeight: 600, fontStyle: "italic", lineHeight: 1.5 }}>"The weather today is quite pleasant and I feel comfortable right now."</div>}
      </div>
    </div>
  );
}

  const promptSpeak = async text => { setUiState("speaking"); setTranscript(""); setStatus(""); await speak(text, { voice: voiceRef.current, rate: 0.88 }); setUiState("listening"); startL(); };
  const startL = () => {
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition; if (!SR) { setUiState("manual"); return; }
    if (recRef.current) { try { recRef.current.stop(); } catch {} }
    const rec = new SR(); rec.lang = "en-US"; rec.interimResults = true; rec.maxAlternatives = 3;
    rec.onstart = () => setUiState("listening");
    rec.onresult = e => { const finals = Array.from(e.results).filter(r => r.isFinal).map(r => r[0].transcript).join(" "); const interim = Array.from(e.results).filter(r => !r.isFinal).map(r => r[0].transcript).join(" "); setTranscript((finals + " " + interim).trim()); if (finals.trim()) processAnswer(finals.trim()); };
    rec.onend = () => setUiState("manual"); rec.onerror = () => setUiState("manual"); recRef.current = rec; rec.start();
  };
  const processAnswer = async text => {
    let value = null;
    if (q.type === "voice_text") value = text.trim();
    else if (q.type === "voice_range") { const words = { zero: 0, one: 1, two: 2, three: 3, four: 4, five: 5, six: 6, seven: 7, eight: 8, nine: 9, ten: 10 }; const m = text.match(/\b(\d+)\b/); if (m) { const n = parseInt(m[1]); if (n >= q.min && n <= q.max) value = n; } if (value === null) { for (const [w, n] of Object.entries(words)) { if (text.toLowerCase().includes(w) && n >= q.min && n <= q.max) { value = n; break; } } } }
    else if (q.type === "select" && q.voiceMap) { for (const [k, v] of Object.entries(q.voiceMap)) { if (text.toLowerCase().includes(k.toLowerCase())) { value = v; break; } } if (!value) { const m = q.options.find(o => text.toLowerCase().includes(o.toLowerCase())); if (m) value = m; } }

        <button onClick={() => { const v = q.defaultValue ?? (q.options?.[0] || "Skipped"); handleManual(v); }} style={{ padding: "9px 5px", background: "none", border: `1px solid ${T.border}`, color: T.muted, borderRadius: 6, cursor: "pointer", fontFamily: "'Share Tech Mono'", fontSize: 9 }}>SKIP →</button>
      </div>
      <button onClick={startL} disabled={uiState === "speaking"} style={{ width: "100%", padding: 14, background: uiState === "listening" ? T.accent + "33" : T.accentDim + "44", border: `2px solid ${uiState === "listening" ? T.accent : T.accentDim}`, color: uiState === "listening" ? T.accent : T.text, borderRadius: 10, cursor: uiState === "speaking" ? "not-allowed" : "pointer", fontFamily: "'Barlow Condensed'", fontWeight: 700, fontSize: 16, letterSpacing: "0.12em", animation: uiState === "listening" ? "listenRing 1.5s infinite" : "none", transition: "all 0.3s" }}>
        {uiState === "listening" ? "🎤 LISTENING…" : uiState === "speaking" ? "🔊 SPEAKING…" : "🎤 TAP TO SPEAK"}
      </button>
    </div>
  );
}

// ══════════════════════════════════════════════════════════════════════════════
// SPLASH
// ══════════════════════════════════════════════════════════════════════════════
function Splash({ onNew, onResume, hasSession, onEditQuestions, customCount }) {
  const [ready, setReady] = useState(false);
  useEffect(() => {
    setTimeout(() => setReady(true), 800);
    setTimeout(() => speak("Welcome to VERITEX. The AI polygraph with voice stress, facial analysis, and custom BS scoring. Tap Begin to start.", { voice: getVoice(), rate: 0.88 }), 1000);
  }, []);
  return (
    <div style={{ minHeight: "100vh", display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", position: "relative", overflow: "hidden", background: `radial-gradient(ellipse at 50% 38%, #08192a 0%, ${T.bg} 65%)` }}>
      <div style={{ position: "absolute", inset: 0, backgroundImage: `linear-gradient(${T.border} 1px,transparent 1px),linear-gradient(90deg,${T.border} 1px,transparent 1px)`, backgroundSize: "50px 50px", opacity: 0.12 }} />
      {ready && <div style={{ textAlign: "center", animation: "fadeUp 0.7s ease forwards" }}>
        <div style={{ position: "relative", width: 110, height: 110, margin: "0 auto 20px" }}>
          <div style={{ position: "absolute", inset: 0, borderRadius: "50%", border: `2px solid ${T.accent}`, animation: "ringOut 2.5s ease-out infinite" }} />
          <div style={{ position: "absolute", inset: 12, borderRadius: "50%", border: `1px solid ${T.gold}33`, animation: "spin 14s linear infinite" }} />
          <div style={{ position: "absolute", inset: 0, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 34 }}>🧠</div>
        </div>
        <div style={{ fontFamily: "'Barlow Condensed'", fontWeight: 900, fontSize: 46, letterSpacing: "0.22em", color: T.white }}>VERITEX</div>
        <div style={{ fontFamily: "'Share Tech Mono'", fontSize: 10, color: T.accent, letterSpacing: "0.28em", marginBottom: 3 }}>AI VOICE POLYGRAPH · v7.0</div>
        <div style={{ fontFamily: "'Share Tech Mono'", fontSize: 9, color: T.muted, letterSpacing: "0.1em", marginBottom: 40 }}>PPG · VSA · FACIAL · GAZE · BS SCORES 1–10</div>

        <div style={{ display: "flex", flexDirection: "column", gap: 10, width: 300 }}>
          <button onClick={onNew} style={{ padding: "16px 32px", background: T.accent, border: "none", color: T.bg, fontFamily: "'Barlow Condensed'", fontWeight: 800, fontSize: 18, letterSpacing: "0.18em", borderRadius: 8, cursor: "pointer" }}>BEGIN EXAMINATION</button>

          {/* Custom question bank button */}
          <button onClick={onEditQuestions} style={{ padding: "14px 28px", background: T.gold + "22", border: `2px solid ${T.gold}`, color: T.gold, fontFamily: "'Barlow Condensed'", fontWeight: 700, fontSize: 15, letterSpacing: "0.12em", borderRadius: 8, cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center", gap: 10 }}>
            <span>📋</span>
            <span>{customCount > 0 ? `EDIT QUESTION BANK (${customCount})` : "QUESTION BANK"}</span>
          </button>

          {hasSession && <button onClick={onResume} style={{ padding: "12px 28px", background: "none", border: `1px solid ${T.gold}`, color: T.gold, fontFamily: "'Barlow Condensed'", fontWeight: 700, fontSize: 15, letterSpacing: "0.15em", borderRadius: 8, cursor: "pointer" }}>⟳ RESUME SESSION</button>}
        </div>

        <div style={{ marginTop: 40, fontFamily: "'Share Tech Mono'", fontSize: 9, color: T.muted, lineHeight: 1.9 }}>FOR ENTERTAINMENT & RESEARCH ONLY<br />NOT A LEGALLY ADMISSIBLE INSTRUMENT</div>
      </div>}
    </div>
  );
}

// ══════════════════════════════════════════════════════════════════════════════
// APP ROOT
// ══════════════════════════════════════════════════════════════════════════════
function App() {
  const [phase, setPhase] = useState("splash"); // splash | editQuestions | questionnaire | calibration | test | hub | customExam | results
  const [session, setSession] = useState(() => loadSess() || { profile: {}, baselines: {}, responses: [], customResponses: [], startedAt: null });
  const [customQuestions, setCustomQuestions] = useState(() => {
    try { return JSON.parse(localStorage.getItem("veritex_questions") || "[]"); } catch { return []; }
  });

  const update = useCallback((patch) => {
    setSession(prev => { const u = { ...prev, ...patch }; saveSess(u); return u; });
  }, []);

  const saveQuestions = (qs) => {
    setCustomQuestions(qs);
    try { localStorage.setItem("veritex_questions", JSON.stringify(qs)); } catch {}
  };

  const hasSession = (() => { const s = loadSess(); return !!(s?.profile && Object.keys(s.profile).length > 4); })();
  const customCount = customQuestions.filter(q => q.text?.trim()).length;

  const handleResume = () => {
    const s = loadSess(); if (!s) return; setSession(s);
    if (s.customResponses?.length >= customCount && customCount > 0) setPhase("results");
    else if (s.responses?.length >= 10) setPhase("hub");
    else if (s.baselines?.rest) setPhase("test");
    else if (Object.keys(s.profile || {}).length > 4) setPhase("calibration");
    else setPhase("questionnaire");
  };

  const handleDelete = () => { clearSess(); setSession({ profile: {}, baselines: {}, responses: [], customResponses: [], startedAt: null }); setPhase("splash"); };

  const phases = ["questionnaire", "calibration", "test", "hub", "customExam", "results"];
  const pIdx = phases.indexOf(phase);

  return (
    <>
      <style>{CSS}</style>

      {phase !== "splash" && phase !== "editQuestions" && (
        <div style={{ position: "sticky", top: 0, zIndex: 100, background: T.bg + "f4", backdropFilter: "blur(14px)", borderBottom: `1px solid ${T.border}`, padding: "8px 18px", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
          <div style={{ fontFamily: "'Share Tech Mono'", fontSize: 11, color: T.accent, letterSpacing: "0.12em" }}>VERITEX</div>
          <div style={{ display: "flex", gap: 5 }}>{phases.map((p, i) => <div key={p} style={{ width: 7, height: 7, borderRadius: "50%", background: pIdx > i ? T.good : pIdx === i ? T.accent : T.border, transition: "background 0.3s" }} />)}</div>
          <div style={{ fontFamily: "'Share Tech Mono'", fontSize: 8, color: T.muted }}>{phase.toUpperCase()}</div>
        </div>
      )}

      {phase === "splash" && (
        <Splash
          onNew={() => { update({ startedAt: Date.now(), customResponses: [] }); setPhase("questionnaire"); }}
          onResume={handleResume}
          hasSession={hasSession}
          onEditQuestions={() => setPhase("editQuestions")}
          customCount={customCount}
        />
      )}

      {phase === "editQuestions" && (
        <QuestionBankEditor
          initialQuestions={customQuestions}
          onSave={(qs) => { saveQuestions(qs); setPhase("splash"); }}
          onCancel={() => setPhase("splash")}
        />
      )}

      {phase === "questionnaire" && (
        <VoiceQuestionnaire existing={session.profile} onComplete={p => { update({ profile: p }); setPhase("calibration"); }} />
      )}

      {phase === "calibration" && (
        <Calibration onComplete={b => { update({ baselines: b }); setPhase("test"); }} />
      )}

      {phase === "test" && (
        <StandardTest profile={session.profile} baselines={session.baselines} onComplete={r => { update({ responses: r }); setPhase("hub"); }} />
      )}

      {phase === "hub" && (
        <ExaminerHub
          session={session}
          customQuestions={customQuestions}
          onStartCustom={() => setPhase("customExam")}
          onEditQuestions={() => setPhase("editQuestions")}
          onProceedToResults={() => setPhase("results")}
        />
      )}

      {phase === "customExam" && (
        <CustomExamination
          session={session}
          customQuestions={customQuestions.filter(q => q.text?.trim())}
          onComplete={customResponses => { update({ customResponses }); setPhase("results"); }}
        />
      )}

      {phase === "results" && (
        <Results
          session={session}
          onReset={() => { update({ profile: {}, baselines: {}, responses: [], customResponses: [], startedAt: Date.now() }); setPhase("questionnaire"); }}
          onDelete={handleDelete}
          onEdit={() => setPhase("editQuestions")}
        />
      )}
    </>
  );
}


ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
</body>
</html>
