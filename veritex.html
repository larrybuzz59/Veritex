<!DOCTYPE html>

<style>
*{box-sizing:border-box;margin:0;padding:0;}
html,body,#root{height:100%;min-height:100%;}
body{background:#060810;font-family:sans-serif;-webkit-tap-highlight-color:transparent;}
#apiscreen{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 24px;background:radial-gradient(ellipse at 50% 40%,#08192a,#060810);}
#apiscreen h1{font-size:36px;letter-spacing:.22em;color:#e8f2f8;margin-bottom:2px;font-weight:900;}
#apiscreen .sub{font-size:10px;color:#2a4055;letter-spacing:.2em;margin-bottom:28px;font-family:monospace;}
#apiscreen .card{background:#0b0f18;border:1px solid #162030;border-radius:12px;padding:24px 20px;width:100%;max-width:360px;}
#apiscreen label{font-size:10px;color:#2a4055;text-transform:uppercase;letter-spacing:.1em;display:block;margin-bottom:7px;font-family:monospace;}
#apiscreen input{width:100%;background:#050810;border:1px solid #162030;color:#e8f2f8;padding:11px 13px;border-radius:6px;font-size:14px;outline:none;font-family:monospace;transition:border-color .2s;}
#apiscreen input:focus{border-color:#00d4ff;}
#apiscreen .hint{font-size:11px;color:#2a4055;line-height:1.7;margin-top:8px;}
#apiscreen .hint a{color:#00d4ff;text-decoration:none;}
#apiscreen .gobtn{margin-top:16px;width:100%;padding:14px;background:#00d4ff;border:none;color:#060810;font-size:15px;font-weight:800;letter-spacing:.15em;border-radius:7px;cursor:pointer;}
#apiscreen .gobtn:disabled{background:#162030;color:#2a4055;cursor:not-allowed;}
#apiscreen .err{margin-top:8px;font-size:12px;color:#ff2550;text-align:center;}
#apiscreen .skip{margin-top:10px;font-size:11px;color:#2a4055;text-align:center;cursor:pointer;text-decoration:underline;}
#root{display:none;}
@media print{
  #apiscreen{display:none!important;}
  #root{display:block!important;}
  .no-print{display:none!important;}
  body{background:#fff!important;color:#000!important;font-size:12px;}
  .print-section{page-break-inside:avoid;border:1px solid #ccc!important;background:#fff!important;color:#000!important;margin-bottom:8px;}
}

<body>
<div id="apiscreen" style="display:none">
  <h1>VERITEX</h1>
  <div class="sub">AI POLYGRAPH · v8.0</div>
  <div class="card">
    <label>Anthropic API Key</label>
    <input type="password" id="apikey" placeholder="sk-ant-api03-..." autocomplete="off" spellcheck="false"/>
    <div class="hint">Stays in this browser session only — sent directly to Anthropic.<br>Get a free key at <a href="https://console.anthropic.com" target="_blank">console.anthropic.com</a></div>
    <button class="gobtn" id="startbtn" disabled onclick="launchApp()">INITIALIZE SYSTEM</button>
    <div class="err" id="apierr"></div>
    <div class="skip" onclick="launchWithoutKey()">Skip AI — sensor analysis only</div>
  </div>
</div>
<div id="root" style="display:block"></div>
<script>
window.VERITEX_API_KEY="";
const ki=document.getElementById("apikey"),sb=document.getElementById("startbtn");
ki.addEventListener("input",()=>{sb.disabled=ki.value.trim().length<20;});
ki.addEventListener("keydown",e=>{if(e.key==="Enter"&&!sb.disabled)launchApp();});
function launchApp(){const key=ki.value.trim();if(key.length<20){document.getElementById("apierr").textContent="Please enter a valid API key.";return;}window.VERITEX_API_KEY=key;document.getElementById("apiscreen").style.display="none";document.getElementById("root").style.display="block";}
function launchWithoutKey(){window.VERITEX_API_KEY="";document.getElementById("apiscreen").style.display="none";document.getElementById("root").style.display="block";}
const _of=window.fetch.bind(window);
window.fetch=function(url,opts){if(typeof url==="string"&&url.includes("api.anthropic.com")&&window.VERITEX_API_KEY){opts=opts||{};opts.headers=Object.assign({},opts.headers||{},{"x-api-key":window.VERITEX_API_KEY});}return _of(url,opts);};
</script>
<script type="text/babel" data-presets="react">
const { useState, useEffect, useRef, useCallback } = React;

const T = {
  bg:"#060810",panel:"#0b0f18",panel2:"#0f1520",border:"#162030",
  accent:"#00d4ff",accentDim:"#003d55",warn:"#ff8c3a",good:"#00ff88",
  bad:"#ff2550",text:"#9ab8cc",muted:"#2a4055",white:"#e8f2f8",
  gold:"#ffc947",purple:"#b06fff",teal:"#00e5cc",rose:"#ff6b9d",mint:"#00ffcc",
};

const CSS = `
@import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Barlow+Condensed:wght@300;400;500;600;700;800;900&display=swap');
*{box-sizing:border-box;margin:0;padding:0;}
body{background:${T.bg};color:${T.text};font-family:'Barlow Condensed',sans-serif;overflow-x:hidden;}
::-webkit-scrollbar{width:3px;}::-webkit-scrollbar-track{background:${T.panel};}::-webkit-scrollbar-thumb{background:${T.accentDim};border-radius:2px;}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.2}}
@keyframes hbeat{0%,100%{transform:scale(1)}14%{transform:scale(1.25)}28%{transform:scale(1)}}
@keyframes ringOut{0%{transform:scale(1);opacity:0.8}100%{transform:scale(3.2);opacity:0}}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
@keyframes voiceBar{0%,100%{transform:scaleY(0.25)}50%{transform:scaleY(1)}}
@keyframes listenRing{0%{box-shadow:0 0 0 0 rgba(0,212,255,.65)}70%{box-shadow:0 0 0 20px rgba(0,212,255,0)}100%{box-shadow:0 0 0 0 rgba(0,212,255,0)}}
@keyframes speakRing{0%{box-shadow:0 0 0 0 rgba(176,111,255,.7)}70%{box-shadow:0 0 0 22px rgba(176,111,255,0)}100%{box-shadow:0 0 0 0 rgba(176,111,255,0)}}
@keyframes stressFlash{0%,100%{background:transparent}50%{background:rgba(255,37,80,.07)}}
@keyframes slideIn{from{opacity:0;transform:translateX(-12px)}to{opacity:1;transform:translateX(0)}}
@keyframes bsGlow{0%,100%{text-shadow:0 0 4px currentColor}50%{text-shadow:0 0 18px currentColor,0 0 32px currentColor}}
@keyframes scorePop{0%{transform:scale(0.5);opacity:0}60%{transform:scale(1.15)}100%{transform:scale(1);opacity:1}}
@keyframes btPulse{0%{box-shadow:0 0 0 0 rgba(0,255,204,.6)}70%{box-shadow:0 0 0 12px rgba(0,255,204,0)}100%{box-shadow:0 0 0 0 rgba(0,255,204,0)}}
input,select,textarea{background:#050810;border:1px solid ${T.border};color:${T.white};font-family:'Barlow Condensed',sans-serif;font-size:16px;border-radius:5px;padding:10px 14px;width:100%;outline:none;transition:border-color 0.2s;}
input:focus,select:focus,textarea:focus{border-color:${T.accent};}
input[type=range]{padding:0;height:3px;accent-color:${T.accent};background:transparent;}
select option{background:#050810;}
label{font-size:10px;color:${T.muted};text-transform:uppercase;letter-spacing:.1em;display:block;margin-bottom:5px;font-family:'Share Tech Mono';}
button:active{transform:scale(.96);}
`;

// SESSION STORE
const SK="veritex_v8";
const loadSess=()=>{try{return JSON.parse(localStorage.getItem(SK)||"null");}catch{return null;}};
const saveSess=d=>{try{localStorage.setItem(SK,JSON.stringify(d));}catch{}};
const clearSess=()=>{try{localStorage.removeItem(SK);}catch{}};
const loadSettings=()=>{try{return JSON.parse(localStorage.getItem("veritex_settings")||"{}");}catch{return {};}};
const saveSettings=d=>{try{localStorage.setItem("veritex_settings",JSON.stringify(d));}catch{}};

// AUTO-DELETE CHECK
function checkAutoDelete(){
  const sess=loadSess();
  if(!sess)return;
  const settings=loadSettings();
  if(!settings.autoDeleteHours)return;
  const exp=sess.startedAt+(settings.autoDeleteHours*3600000);
  if(Date.now()>exp){clearSess();console.log("Session auto-deleted");}
}

// BS SCORE UTILS
function bsColor(s){if(s>=9)return T.good;if(s>=7)return "#7fff6a";if(s>=5)return T.gold;if(s>=3)return T.warn;return T.bad;}
function bsLabel(s){if(s>=9)return "CERTAINLY TRUE";if(s>=7)return "LIKELY TRUE";if(s>=5)return "UNCERTAIN";if(s>=3)return "LIKELY FALSE";return "PROBABLY FALSE";}

// VOICE STRESS ANALYZER with null checks
class VoiceStressAnalyzer{
  constructor(){this.baseline=null;this.pauseBuffer=[];this.wordCountHistory=[];}
  detectPitch(buf,sr){
    if(!buf||buf.length===0)return{pitch:0,voiced:false,rms:0};
    const S=buf.length,M=Math.floor(S/2);
    let rms=0;for(let i=0;i<S;i++)rms+=buf[i]*buf[i];
    rms=Math.sqrt(rms/S);
    if(rms<0.01)return{pitch:0,voiced:false,rms};
    let bo=-1,bc=0,lc=1;
    for(let lag=40;lag<M;lag++){
      let acf=0;
      for(let i=0;i<M;i++){acf+=buf[i]*buf[i+lag];}
      if(acf>bc){bc=acf;bo=lag;}
      if(acf<lc*bc)break;
    }
    const pitch=bo>0?sr/bo:0;
    return{pitch:Math.max(0,Math.min(1000,pitch)),voiced:pitch>50,rms};
  }
  spectralCentroid(f){if(!f||f.length===0)return 0;let ws=0,s=0;for(let i=0;i<f.length;i++){const m=f[i]/255;ws+=i*m;s+=m;}return s>0?ws/s:0;}
  spectralTilt(f){if(!f||f.length===0)return 1;const mid=Math.floor(f.length/4);let lo=0,hi=0;for(let i=0;i<mid;i++)lo+=f[i];for(let i=mid;i<f.length;i++)hi+=f[i];return(hi/(f.length-mid))>0?(lo/mid)/(hi/(f.length-mid)):1;}
  estimateHNR(buf){if(!buf||buf.length<512)return 0;const S=Math.min(buf.length,512);let ac0=0,peak=0;for(let i=0;i<S;i++)ac0+=buf[i]*buf[i];for(let lag=20;lag<S/2;lag++){let ac=0;for(let i=0;i<S-lag;i++)ac+=buf[i]*buf[i+lag];if(ac>peak)peak=ac;}return ac0>0?10*Math.log10(ac0/peak):0;}
  computeJitter(ph){if(!ph||ph.length<4)return 0;const v=ph.filter(p=>p&&p.voiced&&p.pitch>60&&p.pitch<500);if(v.length<3)return 0;let d=0;for(let i=1;i<v.length;i++)d+=Math.abs(v[i].pitch-v[i-1].pitch);const avg=v.reduce((a,b)=>a+b.pitch,0)/v.length;return avg>0?(d/(v.length-1))/avg:0;}
  computeShimmer(rh){if(!rh||rh.length<4)return 0;let d=0;for(let i=1;i<rh.length;i++)d+=Math.abs(rh[i]-rh[i-1]);const avg=rh.reduce((a,b)=>a+b,0)/rh.length;return avg>0?(d/(rh.length-1))/avg:0;}
  detectMicroPauses(rh){if(!rh||!rh.length)return 0;const SILENCE=0.012;let count=0;let silLen=0;for(let i=0;i<rh.length;i++){if(rh[i]<SILENCE){silLen++;}else{if(silLen>=9&&silLen<=60)count++;silLen=0;}}return count;}
  summarize(ph,rh,fh){if(!ph)ph=[];if(!rh)rh=[];const v=ph.filter(p=>p&&p.voiced&&p.pitch>60&&p.pitch<600);const ap=v.length>0?v.reduce((a,b)=>a+b.pitch,0)/v.length:0;const pv=v.length>1?Math.sqrt(v.reduce((a,b)=>a+(b.pitch-ap)**2,0)/(v.length-1)):0;const microPauses=this.detectMicroPauses(rh);return{avgPitch:ap,pitchVariance:pv,jitter:this.computeJitter(ph),shimmer:this.computeShimmer(rh),hnr:ph.length>0?ph.reduce((a,b)=>a+(b.hnr||0),0)/ph.length:0,pauseRatio:rh.length>0?rh.filter(r=>r<0.015).length/rh.length:0,microPauses,speakingRate:(fh||[]).length};}
  stressScore(feat,base){if(!base)return{score:0.5,level:"UNKNOWN",indicators:[]};const ind=[];let score=0;const jd=base.jitter>0?(feat.jitter-base.jitter)/base.jitter:0;if(jd>0.3){score+=0.20*Math.min(jd,1);ind.push({name:"JITTER",val:`+${(jd*100).toFixed(0)}%`,stress:true});}const sd=base.shimmer>0?(feat.shimmer-base.shimmer)/base.shimmer:0;if(sd>0.25){score+=0.15*Math.min(sd,1);ind.push({name:"SHIMMER",val:`+${(sd*100).toFixed(0)}%`,stress:true});}if(base.speakingRate>0){const srd=(base.speakingRate-feat.speakingRate)/base.speakingRate;if(srd>0.3){score+=0.12*Math.min(srd,1);ind.push({name:"SPEAK RATE",val:`-${(srd*100).toFixed(0)}%`,stress:true});}}if(feat.microPauses>(base.microPauses||0)+2){score+=0.12;ind.push({name:"MICRO-PAUSES",val:`${feat.microPauses} detected`,stress:true});}const n=Math.min(score,1);return{score:n,level:n>0.65?"HIGH":n>0.35?"MODERATE":"LOW",indicators:ind};}
  setBaseline(f){this.baseline={...f};}
}

function useVoiceStress(active){
  const ctxRef=useRef(null);const anRef=useRef(null);const anFRef=useRef(null);const streamRef=useRef(null);const engRef=useRef(new VoiceStressAnalyzer());const phRef=useRef([]);const rhRef=useRef([]);const fhRef=useRef([]);
  const [live,setLive]=useState({pitch:0,rms:0,jitter:0,shimmer:0,hnr:0,stressScore:0,stressLevel:"UNKNOWN",speakingRate:0,microPauses:0});
  const [baselineSet,setBaselineSet]=useState(false);
  useEffect(()=>{if(!active)return;let mounted=true;navigator.mediaDevices?.getUserMedia({audio:{echoCancellation:false,noiseSuppression:false,autoGainControl:false,sampleRate:44100}}).then(stream=>{if(!mounted){stream.getTracks().forEach(t=>t.stop());return;}streamRef.current=stream;const ac=new(window.AudioContext||window.webkitAudioContext)();const src=ac.createMediaStreamSource(stream);const analyzer=ac.createAnalyser();analyzer.fftSize=2048;src.connect(analyzer);ctxRef.current=ac;anRef.current=analyzer;const fftData=new Uint8Array(analyzer.frequencyBinCount);const loop=()=>{if(!mounted)return;try{analyzer.getByteFrequencyData(fftData);anFRef.current=fftData.slice();analyzer.getByteTimeDomainData(fftData);const normalizedBuf=Array.from(fftData).map(v=>(v-128)/128);const ph=engRef.current.detectPitch(normalizedBuf,ac.sampleRate);phRef.current.push(ph);if(phRef.current.length>300)phRef.current.shift();const rms=ph.rms;rhRef.current.push(rms);if(rhRef.current.length>300)rhRef.current.shift();fhRef.current.push(Date.now());if(fhRef.current.length>300)fhRef.current.shift();const feat=engRef.current.summarize(phRef.current,rhRef.current,fhRef.current);const stress=engRef.current.baseline?engRef.current.stressScore(feat,engRef.current.baseline):{score:0,level:"UNKNOWN",indicators:[]};setLive({pitch:Math.round(ph.pitch),rms:+(rms.toFixed(4)),jitter:+(feat.jitter.toFixed(3)),shimmer:+(feat.shimmer.toFixed(3)),hnr:+(feat.hnr.toFixed(1)),stressScore:stress.score,stressLevel:stress.level,speakingRate:feat.speakingRate,microPauses:feat.microPauses});}catch(e){console.error("Voice analysis error:",e);}setTimeout(loop,33);}; loop();}catch(e){console.error("Audio setup error:",e);},[active]);
  const captureFeatures=useCallback((ms=3000)=>{const fps=30,frames=Math.floor((ms/1000)*fps);return engRef.current.summarize(phRef.current.slice(-frames),rhRef.current.slice(-frames),fhRef.current.slice(-frames));},[]);
  const setBaseline=useCallback(()=>{const f=engRef.current.summarize(phRef.current,rhRef.current,fhRef.current);engRef.current.setBaseline(f);setBaselineSet(true);return f;},[]);
  const getStressForCapture=useCallback((feat)=>engRef.current.stressScore(feat,engRef.current.baseline),[]);
  return{live,baselineSet,captureFeatures,setBaseline,getStressForCapture};
}

// PPG with null checks
function usePPG(active){
  const streamRef=useRef(null);const rrRef=useRef([]);const sampRef=useRef([]);const [hr,setHr]=useState(null);const [hrv,setHrv]=useState(null);const [fingerDetected,setFingerDetected]=useState(false);
  useEffect(()=>{if(!active)return;let mounted=true;const cv=document.createElement("canvas");cv.width=16;cv.height=16;const ctx=cv.getContext("2d");navigator.mediaDevices?.getUserMedia({video:{facingMode:"environment",width:320,height:240,frameRate:30}}).then(stream=>{if(!mounted){stream.getTracks().forEach(t=>t.stop());return;}streamRef.current=stream;const video=document.createElement("video");video.muted=true;video.srcObject=stream;video.play();const loop=()=>{if(!mounted)return;try{ctx.drawImage(video,0,0,16,16);const idata=ctx.getImageData(0,0,16,16).data;if(!idata)return;let r=0;for(let i=0;i<idata.length;i+=4)r+=idata[i];const avgR=r/(idata.length/4);sampRef.current.push(avgR);if(sampRef.current.length>300)sampRef.current.shift();setFingerDetected(avgR<80);if(sampRef.current.length>30){let peaks=0;for(let i=1;i<sampRef.current.length-1;i++){if(sampRef.current[i]<sampRef.current[i-1]&&sampRef.current[i]<sampRef.current[i+1])peaks++;}const rate=Math.round((peaks/(sampRef.current.length/30))*60);setHr(Math.max(40,Math.min(200,rate)));rrRef.current.push(rate);if(rrRef.current.length>4){const diffs=[];for(let i=1;i<rrRef.current.length;i++)diffs.push((rrRef.current[i]-rrRef.current[i-1])**2);const meanSq=diffs.reduce((a,b)=>a+b,0)/diffs.length;setHrv(Math.round(Math.sqrt(meanSq)));}}}catch(e){console.error("PPG error:",e);}setTimeout(loop,33);}; loop();}catch(e){console.error("PPG camera error:",e);}return()=>{mounted=false;streamRef.current?.getTracks().forEach(t=>t.stop());};},[active]);
  return{hr,hrv,fingerDetected};
}

// TTS + SPEECH
function getVoice(){const v=window.speechSynthesis?.getVoices()||[];return v.find(x=>/Google US English|Alex|Daniel|Samantha/i.test(x.name)&&x.lang.startsWith("en"))||v.find(x=>x.lang.startsWith("en-US"))||v[0];}
function speak(text,opts={}){return new Promise(resolve=>{if(!window.speechSynthesis){resolve();return;}try{window.speechSynthesis.cancel();const u=new SpeechSynthesisUtterance(text);u.rate=opts.rate||0.9;u.pitch=opts.pitch||1;u.voice=opts.voice||getVoice();u.onend=resolve;u.onerror=()=>resolve();window.speechSynthesis.speak(u);}catch(e){console.error("Speech error:",e);resolve();}});}
function parseYesNo(text){if(!text)return null;const t=text.toLowerCase();if(/\b(yes|yeah|yep|correct|affirmative|true|right|yup|sure|absolutely|definitely|positive|certainly)\b/.test(t))return"Yes";if(/\b(no|nope|negative|nah|never|false|wrong|incorrect)\b/.test(t))return"No";return null;}

// Minimal App stub (full components would continue here)
const App=()=>{
  return <div style={{background:T.bg,color:T.text,minHeight:"100vh",padding:32,textAlign:"center"}}><div style={{fontFamily:"'Barlow Condensed'",fontSize:32,color:T.accent,marginBottom:16}}>VERITEX v8</div><div style={{fontSize:14,color:T.muted}}>AI Polygraph System Loading...</div></div>;
};

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);
</script>
</body>
